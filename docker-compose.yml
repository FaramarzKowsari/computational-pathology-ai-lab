services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      CPATHLAB_MODEL_PATH: /models/model.pt
      CPATHLAB_ALLOW_DEMO_PREDICTOR: "true"
    volumes:
      - ./models:/models:ro
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow
